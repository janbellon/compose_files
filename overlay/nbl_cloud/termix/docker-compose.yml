include:
  - ../../../base/termix/compose.yml

services:
  termix:
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: "http://termix:8080"
      caddy.tls: /certs/${CERT_DOMAIN}/fullchain.pem /certs/${CERT_DOMAIN}/privkey.pem
      caddy.basic_auth: "/*"
      caddy.basic_auth.jan: "${BASIC_HASH}"
    networks:
      - caddy

networks:
  caddy:
    external: true
