server:
  interface: 0.0.0.0
  port: 53

  access-control: 0.0.0.0/0 allow

  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  qname-minimisation: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  hide-identity: yes
  hide-version: yes

  prefetch: yes
  cache-min-ttl: 300
  cache-max-ttl: 86400

  do-daemonize: no
  use-syslog: no
  logfile: ""

  verbosity: 4

  so-sndbuf: 0

forward-zone:
  name: "nbl."
  forward-addr: 217.154.95.84
